<script>
        document.getElementById("btnEnviar").addEventListener("click", function() {
            // Pega o que a pessoa escreveu
            const categoria = document.getElementById("categoria").value;
            const relato = document.getElementById("relato").value;
            
            // A nossa senha secreta para o Cadeado do Make! 🔒
            const senhaSegura = "RailanSeguro100"; 
            
            // Pega a data e hora de agora (para a planilha)
            const dataAtual = new Date().toLocaleString("pt-BR");

            if(categoria === "" || relato === "") {
                alert("Por favor, preencha a categoria e o relato antes de enviar.");
                return;
            }
            
            // O endereço do seu robô no Make
            const webhookUrl = "https://hook.eu1.make.com/zwsk3qjpnu4b7p7ef9yt9qd8mvn9e16p"; 
            
            document.getElementById("btnEnviar").innerText = "Enviando...";
            
            // Enviando as informações para o Make (Categoria, Relato, Senha e Data)
            fetch(webhookUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    senha: senhaSegura, 
                    categoria: categoria, 
                    relato: relato,
                    data_envio: dataAtual // Vai para a coluna A do Excel
                })
            }).then(response => {
                alert("Sucesso! O robô recebeu sua mensagem e a planilha foi atualizada.");
                document.getElementById("categoria").value = "";
                document.getElementById("relato").value = "";
                document.getElementById("btnEnviar").innerText = "ENVIAR RELATO PARA ANÁLISE";
            }).catch(error => {
                alert("Erro de conexão com o robô.");
                document.getElementById("btnEnviar").innerText = "ENVIAR RELATO PARA ANÁLISE";
            });
        });
    </script>
