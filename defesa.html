<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Defesa Oficial</title>
    <link rel="stylesheet" href="estilo-radar.css">
</head>
<body>
    <div class="cabecalho-radar">
        <h1>⚔️ Espada da Lei</h1>
        <p>Gere o seu texto oficial para brigar pelos seus direitos</p>
    </div>
    
    <div class="nav-menu-radar">
        <a href="radar.html">♿ Radar Acessibilidade</a>
        <a href="defesa.html">⚔️ Gerador de Defesa (Leis)</a>
    </div>

    <div class="container-radar">
        <h2>Gerador de Texto de Defesa</h2>
        <p class="instrucao">Selecione o problema e o sistema vai criar um texto forte com a lei correta para você copiar e mandar para o banco ou loja.</p>
        
        <label for="problema">⚠️ Qual foi o problema?</label>
        <select id="problema">
            <option value="">-- Escolha o seu problema --</option>
            <option value="taxa_banco">Banco cobrando taxa mensal escondida (Conta Confusão)</option>
            <option value="acessibilidade">Falta de Acessibilidade (Lei Brasileira de Inclusão)</option>
            <option value="golpe_loja">Comprei e a loja sumiu / Não entregou</option>
        </select>
        
        <button class="btn-defesa">⚖️ GERAR TEXTO OFICIAL</button>
    </div>
</body>
</html>
