<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistente Digital 🤖</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="header">
        <h1 style="color: #d39e00; text-shadow: 0px 2px 2px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; gap: 10px;">
            <img src="escudo-sem-fundo.png" alt="Escudo Oficial" style="height: 55px;">
            Sistema Nacional de Verificação
        </h1>
    </div>

    <div class="nav-menu">
        <a href="index.html">🔍 Verificador (Início)</a>
        <a href="chat.html" class="ativo">🤖 Assistente</a>
        <a href="reclamacoes.html">📝 Central de Relatos</a>
        <a href="radar.html">
            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: text-bottom; margin-right: 4px;">
                <circle cx="12" cy="12" r="10"></circle>
                <circle cx="12" cy="7" r="2"></circle>
                <path d="M5 11h14"></path>
                <path d="M9 20l3-6 3 6"></path>
            </svg>
            Radar Acessibilidade
        </a>
        <a href="defesa.html">⚔️ Espada da Lei</a>
        <a href="biblioteca.html">📚 Biblioteca</a>
    </div>

    <div class="container-radar">
        <h2>Atendimento Imediato</h2>
        <p class="instrucao">Digite a sua dúvida abaixo. O sistema responde na hora.</p>

        <div style="background-color: #f5f5f7; border-radius: 12px; padding: 20px; max-width: 600px; margin: 20px auto; border: 1px solid #ddd; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
            
            <div id="tela-conversa" style="height: 350px; overflow-y: auto; background-color: white; padding: 15px; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px;">
                <div style="background-color: #e9ecef; color: #333; padding: 10px 15px; border-radius: 15px 15px 15px 0px; max-width: 80%; align-self: flex-start; font-size: 15px;">
                    <strong>🤖 RailanTech:</strong><br>Olá! Eu sou o assistente digital. Escreva a sua dúvida abaixo.
                </div>
            </div>

            <div style="display: flex; gap: 10px; width: 100%; flex-wrap: wrap;">
                <input type="text" id="perguntaUsuario" placeholder="Digite sua dúvida aqui..." style="flex-grow: 1; height: 55px; padding: 10px 15px; border: 2px solid #007bff; border-radius: 8px; font-size: 16px; min-width: 200px; box-sizing: border-box; outline: none;">
                <button onclick="enviarPergunta()" style="background-color: #28a745; color: white; border: none; padding: 0 30px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; height: 55px; white-space: nowrap;">Enviar</button>
            </div>

        </div>
    </div>

    <script>
        function enviarPergunta() {
            const input = document.getElementById('perguntaUsuario');
            const pergunta = input.value.toLowerCase();
            const tela = document.getElementById('tela-conversa');
            
            if(pergunta.trim() === '') {
                return; 
            }

            tela.innerHTML += `<div style="background-color: #007bff; color: white; padding: 10px 15px; border-radius: 15px 15px 0px 15px; max-width: 80%; align-self: flex-end; font-size: 15px;"><strong>👤 Você:</strong><br>${input.value}</div>`;
            
            let respostaRobo = "";

            if(pergunta.includes('golpe') || pergunta.includes('roubo') || pergunta.includes('falso') || pergunta.includes('pix')) {
                respostaRobo = "Calma! A primeira regra é: Bloqueie o contato imediatamente. Não mande mais dinheiro. Vá na nossa Sala de 'Alerta de Golpes' para ver como denunciar no banco.";
            } 
            else if(pergunta.includes('direito') || pergunta.includes('lei') || pergunta.includes('surdo') || pergunta.includes('pcd') || pergunta.includes('imposto')) {
                respostaRobo = "Excelente! Pessoas com deficiência (PCD) têm direito a Passe Livre, Intérprete de Libras e isenção de impostos. Leia tudo mastigado na nossa Sala de 'Seus Direitos'.";
            }
            else if(pergunta.includes('loja') || pergunta.includes('comprar') || pergunta.includes('site') || pergunta.includes('seguro')) {
                respostaRobo = "Para saber se um site é seguro, vá na nossa página inicial (🔍 Verificador) e cole o link da loja lá. Eu vou analisar se é oficial ou falso para você!";
            }
            else {
                respostaRobo = "Desculpe, meu sistema ainda está aprendendo! 🐢 Tente usar palavras mais simples, como: 'golpe', 'direitos' ou 'loja'. Ou visite nossa Biblioteca no menu acima.";
            }

            setTimeout(() => {
                tela.innerHTML += `<div style="background-color: #e9ecef; color: #333; padding: 10px 15px; border-radius: 15px 15px 15px 0px; max-width: 80%; align-self: flex-start; font-size: 15px;"><strong>🤖 RailanTech:</strong><br>${respostaRobo}</div>`;
                tela.scrollTop = tela.scrollHeight;
            }, 800);

            input.value = "";
        }

        document.getElementById("perguntaUsuario").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                enviarPergunta();
            }
        });
    </script>
</body>
</html>
