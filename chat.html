<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistente Automático 🤖</title>
    <link rel="stylesheet" href="estilo.css">
    <style>
        /* Estilos visuais do Bate-Papo Real */
        .caixa-chat {
            background-color: #f5f5f7;
            border-radius: 12px;
            padding: 20px;
            max-width: 600px;
            margin: 20px auto;
            border: 1px solid #ddd;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .historico-chat {
            height: 300px;
            overflow-y: auto;
            background-color: white;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .mensagem-robo {
            background-color: #e9ecef;
            color: #333;
            padding: 10px 15px;
            border-radius: 15px 15px 15px 0px;
            max-width: 80%;
            align-self: flex-start;
            font-size: 15px;
        }
        .mensagem-humano {
            background-color: #007bff;
            color: white;
            padding: 10px 15px;
            border-radius: 15px 15px 0px 15px;
            max-width: 80%;
            align-self: flex-end;
            font-size: 15px;
        }
        .area-digitacao {
            display: flex;
            gap: 10px;
        }
        .area-digitacao input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
        }
        .area-digitacao button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .area-digitacao button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 style="color: #d39e00; text-shadow: 0px 2px 2px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; gap: 10px;">
            <img src="escudo-sem-fundo.png" alt="Escudo Oficial" style="height: 55px;">
            Sistema Nacional de Verificação
        </h1>
    </div>

    <div class="nav-menu">
        <a href="index.html">🔍 Verificador</a>
        <a href="chat.html" class="ativo">🤖 Assistente Automático</a>
        <a href="biblioteca.html">📚 Biblioteca</a>
    </div>

    <div class="container-radar">
        <h2>Atendimento Imediato</h2>
        <p class="instrucao">Digite a sua dúvida abaixo. O sistema responde na hora.</p>

        <div class="caixa-chat">
            
            <div class="historico-chat" id="tela-conversa">
                <div class="mensagem-robo">
                    <strong>🤖 RailanTech:</strong><br>Olá! Eu sou o assistente digital. Escreva sua dúvida abaixo (Ex: golpe, leis, direitos, surdo, etc).
                </div>
            </div>

            <div class="area-digitacao">
                <input type="text" id="perguntaUsuario" placeholder="Digite sua dúvida aqui...">
                <button onclick="enviarPergunta()">Enviar</button>
            </div>

        </div>
    </div>

    <script>
        function enviarPergunta() {
            const input = document.getElementById('perguntaUsuario');
            const pergunta = input.value.toLowerCase(); // Transforma tudo em minúsculo
            const tela = document.getElementById('tela-conversa');
            
            if(pergunta.trim() === '') {
                return; // Se estiver vazio, não faz nada
            }

            // 1. Mostra a mensagem da pessoa na tela
            tela.innerHTML += `<div class="mensagem-humano"><strong>👤 Você:</strong><br>${input.value}</div>`;
            
            // 2. O Robô caça as palavras-chave para responder
            let respostaRobo = "";

            if(pergunta.includes('golpe') || pergunta.includes('roubo') || pergunta.includes('falso') || pergunta.includes('pix')) {
                respostaRobo = "Calma! A primeira regra é: Bloqueie o contato imediatamente. Não mande mais dinheiro. Vá na nossa Sala de 'Alerta de Golpes' para ver como denunciar no banco.";
            } 
            else if(pergunta.includes('direito') || pergunta.includes('lei') || pergunta.includes('surdo') || pergunta.includes('pcd') || pergunta.includes('imposto')) {
                respostaRobo = "Excelente! Pessoas com deficiência (PCD) têm direito a Passe Livre, Intérprete de Libras e isenção de impostos. Leia tudo mastigado na nossa Sala de 'Seus Direitos'.";
            }
            else if(pergunta.includes('loja') || pergunta.includes('comprar') || pergunta.includes('site') || pergunta.includes('seguro')) {
                respostaRobo = "Para saber se um site é seguro, vá na nossa página inicial (🔍 Verificador) e cole o link da loja lá. Eu vou analisar se é oficial ou falso para você!";
            }
            else {
                // Se o robô não entender a palavra
                respostaRobo = "Desculpe, meu sistema ainda está aprendendo! 🐢 Tente usar palavras mais simples, como: 'golpe', 'direitos' ou 'loja'. Ou visite nossa Biblioteca no menu acima.";
            }

            // 3. Mostra a resposta do robô na tela depois de 1 segundo (pra parecer que está pensando)
            setTimeout(() => {
                tela.innerHTML += `<div class="mensagem-robo"><strong>🤖 RailanTech:</strong><br>${respostaRobo}</div>`;
                // Faz a barra de rolagem descer automaticamente
                tela.scrollTop = tela.scrollHeight;
            }, 800);

            // Limpa a caixa de texto
            input.value = "";
        }

        // Fazer o botão "Enter" do teclado funcionar também
        document.getElementById("perguntaUsuario").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                enviarPergunta();
            }
        });
    </script>
</body>
</html>
