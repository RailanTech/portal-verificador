<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Anti-Golpe - Verificação Oficial</title>
    <style>
        /* DESIGN NÍVEL IPHONE / APPLE */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #F5F5F7; /* Cinza clássico premium */
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .container { 
            background-color: #FFFFFF; 
            padding: 50px 40px; 
            border-radius: 28px; /* Cantos bem redondos nível iPhone */
            box-shadow: 0 20px 40px rgba(0,0,0,0.08); /* Sombra suave flutuante */
            text-align: center; 
            max-width: 420px; 
            width: 90%; 
            margin: 20px; 
        }
        /* PONTO FORTE: A Arte Visual do Brasão */
        .brasao {
            max-width: 120px; 
            height: auto; 
            margin: 0 auto 25px auto; 
            display: block; 
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }
        h1 { 
            color: #1D1D1F; 
            font-size: 28px; 
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 8px; 
            display: block; 
            text-align: center; 
            letter-spacing: -0.5px;
        }
        /* MARKETING PRECISO (Emoção) */
        .subtitle { 
            color: #86868B; 
            margin-bottom: 35px; 
            font-size: 16px; 
            font-weight: 500;
            line-height: 1.4;
        }
        input[type="text"] { 
            width: 100%; 
            padding: 16px 20px; 
            margin-bottom: 20px; 
            background-color: #F5F5F7;
            border: 2px solid transparent; 
            border-radius: 16px; 
            font-size: 17px; 
            transition: all 0.3s ease; 
            box-sizing: border-box; 
            color: #1D1D1F;
        }
        input[type="text"]:focus { 
            border-color: #007AFF; /* Azul Apple */
            background-color: #FFFFFF;
            outline: none; 
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1);
        }
        button { 
            background-color: #007AFF; 
            color: white; 
            border: none; 
            padding: 18px 20px; 
            border-radius: 16px; 
            font-size: 17px; 
            cursor: pointer; 
            font-weight: 600; 
            width: 100%; 
            transition: all 0.3s ease; 
            letter-spacing: 0.3px; 
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
        }
        button:hover { 
            background-color: #0066D6; 
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 122, 255, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        /* DESIGN DO RESULTADO */
        #resultado { 
            margin-top: 30px; 
            padding: 24px; 
            border-radius: 20px; 
            text-align: left; 
            font-size: 16px; 
            background-color: #FBFBFD; 
            color: #1D1D1F; 
            overflow-wrap: break-word; 
            border-left: 6px solid transparent; 
            line-height: 1.6; 
            display: none; 
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        #resultado strong { color: #000000; font-weight: 600; }
        #resultado h3 { margin: 18px 0 8px 0; color: #1D1D1F; font-size: 19px; }
    </style>
</head>
<body>

    <div class="container">
        <img src="escudo-sem-fundo.png" alt="Selo Oficial de Segurança Railan Tech" class="brasao">
        
        <h1>Radar Anti-Golpe</h1>
        <div class="subtitle">O seu escudo digital. Verificação oficial e instantânea contra fraudes.</div>
        
        <input type="text" id="linkInput" placeholder="Cole o link suspeito aqui...">
        <button onclick="verificarLink()">⚡ VERIFICAR AGORA</button>
        
        <div id="resultado"></div>
    </div>

    <script>
        function formatarTexto(texto) {
            return texto
                .replace(/### (.*?)\n/g, '<h3>$1</h3>') 
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>') 
                .replace(/\*(.*?)\*/g, '<em>$1</em>') 
                .replace(/\[SEGURO\]/gi, '') 
                .replace(/\[GOLPE\]/gi, '') 
                .replace(/\n/g, '<br>'); 
        }

        async function verificarLink() {
            const link = document.getElementById('linkInput').value;
            const divResultado = document.getElementById('resultado');

            if (!link) {
                divResultado.style.display = "block";
                divResultado.style.borderLeftColor = "#FF3B30"; /* Vermelho Apple */
                divResultado.innerHTML = "❌ <b>Atenção:</b> Por favor, cole um link primeiro!";
                return;
            }

            divResultado.style.display = "block";
            divResultado.style.borderLeftColor = "#FFCC00"; /* Amarelo Apple */
            divResultado.innerHTML = "⏳ <b>Analisando sistema de segurança... aguarde!</b>";

            const url_do_cofre = "https://tiny-lab-bc9b.analise-seguranca.workers.dev";
            
            const comando_ia = `Analise este link: ${link}. REGRA MÁXIMA: Comece a sua resposta OBRIGATORIAMENTE digitando a etiqueta secreta [SEGURO] se o site for verdadeiro/oficial, ou a etiqueta [GOLPE] se o site for falso/perigoso. Após a etiqueta, pule uma linha, explique em tópicos e dê dicas de segurança.`;
            
            const payload = {
                contents: [{ parts: [{ text: comando_ia }] }]
            };

            try {
                const resposta_do_cofre = await fetch(url_do_cofre, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const texto_bruto = await resposta_do_cofre.text();
                
                try {
                    const dados = JSON.parse(texto_bruto);
                    
                    if (dados.error) {
                        divResultado.style.borderLeftColor = "#FF3B30";
                        divResultado.innerHTML = "🚨 <b>Bloqueio de Segurança:</b> " + dados.error.message;
                        return;
                    }

                    if (dados.candidates && dados.candidates[0]) {
                        const texto_ia = dados.candidates[0].content.parts[0].text;
                        const texto_maiusculo = texto_ia.toUpperCase();
                        
                        const eh_golpe = texto_maiusculo.includes("[GOLPE]");

                        let status_final = "SEGURO";

                        if (eh_golpe) {
                            status_final = "GOLPE";
                            divResultado.style.borderLeftColor = "#FF3B30"; /* Vermelho Perigo Apple */
                            divResultado.innerHTML = "🚨 <b>ALERTA MÁXIMO DE GOLPE:</b><br>" + formatarTexto(texto_ia);
                        } else {
                            divResultado.style.borderLeftColor = "#34C759"; /* Verde Seguro Apple */
                            divResultado.innerHTML = "✅ <b>Análise Concluída: Seguro</b><br>" + formatarTexto(texto_ia);
                        }

                        // =================================================================
                        // 🤖 O CÉREBRO ESPIÃO DA RAILAN TECH (Invisível)
                        // Cole o seu link gigante de App da Web dentro das aspas abaixo:
                        const url_do_robo = "https://script.google.com/macros/s/AKfycbxsR234grgtgilnf5aHT1bVgCUEW94XVpM5YNvrn_GemDNGB_5ewqHV7Sc7ymcRzAMR/exec"; 
                        // =================================================================
                        
                        if (url_do_robo !== "COLE_AQUI_O_LINK_DO_APP_DA_WEB") {
                            fetch(url_do_robo, {
                                method: 'POST',
                                body: JSON.stringify({ link: link, status: status_final })
                            }).catch(e => console.log("Anotação silenciosa concluída."));
                        }
                        
                    } else {
                        divResultado.style.borderLeftColor = "#FF3B30";
                        divResultado.innerHTML = "⚠️ <b>Erro de Resposta:</b> " + texto_bruto;
                    }

                } catch (e) {
                    divResultado.style.borderLeftColor = "#FF3B30";
                    divResultado.innerHTML = "🚨 <b>Erro no Servidor:</b> " + texto_bruto;
                }

            } catch (erro) {
                divResultado.style.borderLeftColor = "#FF3B30";
                divResultado.innerHTML = "❌ <b>Sem Conexão:</b> O sistema está offline no momento.";
            }
        }
    </script>
</body>
</html>
