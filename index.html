<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Railan Tech - Sistema de Verificação</title>
</head>
<body style="background-color: black; color: gold; text-align: center; font-family: Arial; padding-top: 50px;">
    <h1>🛡️ RAILAN TECH 🛡️</h1>
    <h2>Sistema Nacional de Verificação Oficial</h2>
    <p>Projeto em construção com Inteligência e Custo-Benefício 100%.</p>
    
    <div style="margin: 20px; padding: 10px; background-color: #222; border-radius: 8px; border: 1px solid #444;">
        <a href="defesa.html" style="color: white; text-decoration: none; font-weight: bold; margin: 0 15px;">🛡️ DEFESA</a> |
        <a href="golpes.html" style="color: #ff4444; text-decoration: none; font-weight: bold; margin: 0 15px;">🚨 GOLPES</a> |
        <a href="radar.html" style="color: #00BFFF; text-decoration: none; font-weight: bold; margin: 0 15px;">📡 RADAR</a> |
        <a href="ouro.html" style="color: gold; text-decoration: none; font-weight: bold; margin: 0 15px;">🏆 OURO</a>
    </div>

    <div style="margin: 30px auto; padding: 20px; background-color: #111; border: 2px solid gold; border-radius: 10px; width: 80%; max-width: 500px;">
        <h3 style="color: white; margin-bottom: 15px;">🔎 Cole o link ou texto suspeito aqui:</h3>
        <input type="text" id="caixaTexto" placeholder="Ex: www.site-falso.com.br" style="width: 80%; padding: 12px; border-radius: 5px; border: none; font-size: 16px; margin-bottom: 15px;">
        <br>
        <button onclick="analisarComIA()" style="background-color: #00BFFF; color: black; padding: 12px 25px; border: none; border-radius: 5px; font-size: 18px; font-weight: bold; cursor: pointer;">⚡ VERIFICAR COM IA</button>

        <div id="resultadoIA" style="display: none; margin-top: 20px; padding: 15px; background-color: #222; color: white; border: 1px solid #444; border-radius: 5px; text-align: left; font-size: 16px; word-wrap: break-word;"></div>
    </div>

    <br>
    <a href="mailto:railantech.contato@gmail.com" style="background-color: #28a745; color: white; padding: 15px 30px; text-decoration: none; font-size: 16px; font-weight: bold; border-radius: 8px; border: 2px solid white; display: inline-block;">🚨 ENVIAR PARA ANÁLISE HUMANA 🚨</a>

    <script>
        async function analisarComIA() {
            const texto = document.getElementById("caixaTexto").value;
            const resultadoDiv = document.getElementById("resultadoIA");

            if (!texto) {
                alert("Gigante, por favor, cole um link ou texto primeiro!");
                return;
            }

            resultadoDiv.style.display = "block";
            resultadoDiv.innerHTML = "⏳ <b>O Detetive está analisando a Lógica... Aguarde!</b>";

            // 🚨 A SUA CHAVE DE OURO BLINDADA 🚨
            const API_KEY = "AIzaSyAb8LKzPdNurW7ijOKiB0GY-dm7HhdSQoA"; 
            
            // 🚨 AGORA SIM: LIGAÇÃO DIRETA COM O MOTOR DO FUTURO (GEMINI 3 FLASH PREVIEW) 🚨
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${API_KEY}`;
            const prompt = `Você é o Investigador Oficial da empresa Railan Tech. Analise este texto ou link suspeito e descubra se é GOLPE, FRAUDE ou SEGURO. Use a lógica. Seja curto, direto e dê um veredito final claro com uma destas palavras: 🟢 SEGURO, 🟡 SUSPEITO ou 🔴 GOLPE. Texto do cliente: ${texto}`;

            try {
                const resposta = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                
                const dados = await resposta.json();

                if (!resposta.ok) {
                    resultadoDiv.innerHTML = `❌ <b>ERRO DO SISTEMA:</b> ${dados.error.message}`;
                    return;
                }

                const analise = dados.candidates[0].content.parts[0].text;
                resultadoDiv.innerHTML = `<b>🤖 Relatório Oficial Railan Tech:</b><br><br>${analise.replace(/\n/g, '<br>')}`;
            } catch (erro) {
                resultadoDiv.innerHTML = `❌ <b>ERRO DO SISTEMA:</b> ${erro.message}`;
            }
        }
    </script>
</body>
</html>
